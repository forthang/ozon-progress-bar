<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>OzonIntership</title>
  </head>
  <body>
    <div class="app" id="app">
      <h1 class="app__title">Progress</h1> 
      <div class="app__progress" id="progress-container"></div>
      <div class="app__controls">
        <div class="control">
          <input
            class="control__input"
            id="value-input"
            type="number"
            min="0"
            max="100"
            value="0"
          />
          <label class="control__label" for="value-input">Value</label>
        </div>
        <div class="control">
          <label class="control__switch">
            <input
              class="control__checkbox"
              id="animate-toggle"
              type="checkbox"
            />
            <span class="control__slider"></span>
          </label>
          <span class="control__label">Animate</span>
        </div>
        <div class="control">
          <label class="control__switch">
            <input
              class="control__checkbox"
              id="hide-toggle"
              type="checkbox"
            />
            <span class="control__slider"></span>
          </label>
          <span class="control__label">Hide</span>
        </div>

      </div>
    </div>
  </body>
</html>
